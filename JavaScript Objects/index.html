<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Objects</title>
    <script src="games.js" defer></script>
</head>
<body>
    <h1>Game Title</h1>
    <h3 id="details"></h3>

    <p>Please enter a game title</p>
    <input type="text" id="gtitle"><br><br>

    <p>Please rate the game on a scale from 1 to 100</p>
    <input type="number" id="gscore"><br><br>

    <p>Please enter the game's developer</p>
    <input type="text" id="gdeveloper"><br><br>
    <button type="button"onclick="getGameInfo()">Submit</button>

    <h2 id="results"></h2>

</body>
</html>
