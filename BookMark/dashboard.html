<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | BookMark</title>
    <script src="index.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <form id="myForm">
                <input type="text" id="bookEntry" placeholder="Add a Book">
                <input type="button" id="resetButton" onclick="saveBook()" value="Submit"></button>
            </form>
        </ul>
    </header>
    <main>

    <section>
        <h2>Hi Jairus</h2>
        <br>
        <p>Welcome to your reading dashboard!</p>
    </section>

        <section class="tiles-container">
            <div class="tile">
                <h2>Favorite Books</h2>
                <br>
                <p id="bookList"></p>
            </div>

            <div class="tile">
                <h2>Currently Reading</h2>
            </div>

            <div class="tile">
                <h2>TBR</h2>
            </div>

            <div class="tile">
                <h2>You're Next Read</h2>
            </div>
        </section>
    </main>
</body>

</html>
